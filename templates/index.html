<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СТО «Герат»</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .scrollable-area { max-height: 400px; overflow-y: auto; background-color: #fff; border-radius: 8px; border: 1px solid #dee2e6; }
        .model-item { cursor: pointer; transition: 0.1s; font-size: 1.1rem; padding: 10px 15px 10px 2.5rem; border-bottom: 1px solid #eee; position: relative; }
        .model-item:hover { background-color: #f1f3f5; }
        .model-item.active { background-color: #e9ecef; border-left: 4px solid #0d6efd; font-weight: bold; }
        .action-btn { opacity: 0; transition: 0.2s; cursor: pointer; margin-left: 8px; font-size: 1rem; }
        .brand-row:hover .action-btn, .model-item:hover .action-btn { opacity: 1; }
        .edit-icon { color: #ffc107; } .del-icon { color: #dc3545; }
        .brand-header-btn { cursor: pointer; font-weight: bold; font-size: 1.1rem; background: none; border: none; flex-grow: 1; text-align: left; padding: 10px; }
        @media (min-width: 992px) {
            body { overflow: hidden; }
            .scrollable-cars, .scrollable-gen { height: calc(100vh - 280px); max-height: none; }
            .scrollable-services { height: calc(100vh - 240px); max-height: none; }
            .scrollable-cart { height: calc(100vh - 300px); max-height: none; }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-3">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold fs-4">🔧 СТО «Герат»</a>
    <div class="navbar-nav">
        <a class="nav-link text-white active fw-bold fs-5 ms-3">Гараж (Послуги)</a>
        <a class="nav-link text-secondary fs-5 ms-3">Автомагазин</a>
    </div>
  </div>
</nav>

<div class="container-fluid px-4">
    <div class="row g-4">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white pt-2 pb-0">
                    <ul class="nav nav-tabs border-0">
                      <li class="nav-item"><a class="nav-link active" id="tab-cars" onclick="switchTab('cars')">🚗 База Авто</a></li>
                      <li class="nav-item"><a class="nav-link" id="tab-gen" onclick="switchTab('gen')">🛠 Загальні послуги</a></li>
                    </ul>
                </div>
                <div class="card-body p-3 bg-light">
                    <div id="view-cars" class="row g-3">
                        <div class="col-lg-5">
                            <div class="d-flex justify-content-between mb-2">
                                <h5 class="text-primary fw-bold m-0">Марки та Моделі</h5>
                                <div>
                                    <button class="btn btn-primary btn-sm fw-bold me-1" onclick="carModal.show()"><i class="bi bi-plus-lg"></i> Додати авто</button>
                                    <button class="btn btn-outline-primary btn-sm fw-bold" onclick="importModal.show()"><i class="bi bi-robot"></i> Імпорт з ШІ</button>
                                </div>
                            </div>
                            <input type="text" id="carSearch" class="form-control mb-2" placeholder="Пошук..." oninput="filterCars()">
                            <div class="scrollable-area scrollable-cars"><div class="accordion accordion-flush" id="brandsAccordion"></div></div>
                        </div>
                        <div class="col-lg-7">
                            <div id="carServicesArea" class="d-none">
                                <div class="d-flex justify-content-between mb-2">
                                    <h5 class="text-secondary fw-bold m-0" id="selectedCarTitle">Послуги</h5>
                                    <button class="btn btn-success btn-sm" onclick="serviceModal.show()"><i class="bi bi-plus-lg"></i> Додати послугу</button>
                                </div>
                                <div class="scrollable-area scrollable-services px-2 py-1"><table class="table table-hover align-middle bg-white"><tbody id="servicesTable"></tbody></table></div>
                            </div>
                            <div id="noCar" class="text-center mt-5 text-muted"><i class="bi bi-car-front fs-1"></i><h6>Оберіть модель</h6></div>
                        </div>
                    </div>
                    <div id="view-gen" class="d-none">
                        <div class="d-flex justify-content-between mb-2"><h5 class="fw-bold">Загальні послуги</h5><button class="btn btn-dark btn-sm" onclick="genModal.show()"><i class="bi bi-plus-lg"></i> Додати</button></div>
                        <div class="scrollable-area scrollable-gen px-2"><table class="table table-hover align-middle"><tbody id="genServicesTable"></tbody></table></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="card shadow-sm border-primary h-100">
                <div class="card-header bg-primary text-white d-flex justify-content-between py-3">
                    <h5 class="m-0 fw-bold"><i class="bi bi-receipt"></i> Чек</h5>
                    <span class="badge bg-light text-primary fs-6" id="cartTotal">0 ₴</span>
                </div>
                <div class="card-body p-0 d-flex flex-column">
                    <div class="scrollable-area scrollable-cart border-0 flex-grow-1"><ul class="list-group list-group-flush" id="cartList"></ul></div>
                    <div class="p-3 bg-light border-top"><button class="btn btn-success w-100 btn-lg fw-bold" id="printBtn" disabled onclick="window.print()">ДРУКУВАТИ</button></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="carModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5>Додати авто</h5></div><div class="modal-body"><input id="nb" class="form-control mb-2" placeholder="Марка (Ford)"><input id="nm" class="form-control" placeholder="Модель (Focus)"></div><div class="modal-footer"><button class="btn btn-primary w-100" onclick="saveCar()">Зберегти</button></div></div></div></div>
<div class="modal fade" id="importModal" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content"><div class="modal-header bg-primary text-white"><h5>Імпорт через ШІ</h5></div><div class="modal-body"><textarea id="it" class="form-control" rows="10"></textarea></div><div class="modal-footer"><button class="btn btn-primary w-100" onclick="runImport()">ІМПОРТУВАТИ</button></div></div></div></div>
<div class="modal fade" id="serviceModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-header bg-success text-white"><h5>Нова послуга</h5></div><div class="modal-body"><input id="sn" class="form-control mb-2" placeholder="Назва"><input id="sp" type="number" class="form-control" placeholder="Ціна"></div><div class="modal-footer"><button class="btn btn-success w-100" onclick="saveSrv()">Додати</button></div></div></div></div>
<div class="modal fade" id="genModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-header bg-dark text-white"><h5>Загальна послуга</h5></div><div class="modal-body"><input id="gn" class="form-control mb-2" placeholder="Назва"><input id="gp" type="number" class="form-control" placeholder="Ціна"></div><div class="modal-footer"><button class="btn btn-dark w-100" onclick="saveGen()">Додати</button></div></div></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let dbDict = {{ db_dict | tojson }}; let genSrv = {{ general_services | tojson }};
    let curB = ""; let curM = ""; let searchQ = ""; let cart = [];
    const carModal = new bootstrap.Modal(document.getElementById('carModal')), importModal = new bootstrap.Modal(document.getElementById('importModal')), serviceModal = new bootstrap.Modal(document.getElementById('serviceModal')), genModal = new bootstrap.Modal(document.getElementById('genModal'));

    function renderBrands() {
        const acc = document.getElementById('brandsAccordion'); acc.innerHTML = '';
        Object.keys(dbDict).sort().forEach((b, i) => {
            let mods = Object.keys(dbDict[b]).filter(m => m.toLowerCase().includes(searchQ) || b.toLowerCase().includes(searchQ));
            if (searchQ && !mods.length) return;
            let mHtml = mods.sort().map(m => `
                <div class="model-item d-flex justify-content-between align-items-center ${curB===b && curM===m?'active':''}" onclick="selectM('${b}','${m}')">
                    <span>${m}</span><div><i class="bi bi-pencil-square action-btn edit-icon" onclick="event.stopPropagation(); renM('${b}','${m}')"></i><i class="bi bi-trash action-btn del-icon" onclick="event.stopPropagation(); delM('${b}','${m}')"></i></div>
                </div>`).join('');
            acc.innerHTML += `
                <div class="accordion-item border-0 border-bottom"><div class="d-flex align-items-center bg-white brand-row px-2">
                    <button class="brand-header-btn" type="button" data-bs-toggle="collapse" data-bs-target="#c${i}">${b}</button>
                    <i class="bi bi-pencil-square action-btn edit-icon" onclick="renB('${b}')"></i><i class="bi bi-trash action-btn del-icon px-2" onclick="delB('${b}')"></i>
                </div><div id="c${i}" class="accordion-collapse collapse show"><div class="list-group list-group-flush">${mHtml}</div></div></div>`;
        });
    }

    function selectM(b, m) { curB=b; curM=m; renderBrands(); renderSrv(); document.getElementById('noCar').classList.add('d-none'); document.getElementById('carServicesArea').classList.remove('d-none'); document.getElementById('selectedCarTitle').innerText = b+' '+m; }

    function renderSrv() {
        const tb = document.getElementById('servicesTable'); tb.innerHTML = '';
        dbDict[curB][curM].forEach(s => {
            tb.innerHTML += `<tr><td class="w-100">${s.posluga}</td><td class="text-end fw-bold px-3 text-nowrap">${s.cina} ₴</td>
                <td class="text-end text-nowrap">
                    <i class="bi bi-pencil-square text-warning fs-5 me-3 pointer" style="cursor:pointer" onclick="edP(${s.id},${s.cina})"></i>
                    <i class="bi bi-trash text-danger fs-5 me-3 pointer" style="cursor:pointer" onclick="delS(${s.id})"></i>
                    <i class="bi bi-plus-circle-fill text-success fs-4 pointer" style="cursor:pointer" onclick="addC('${s.posluga}',${s.cina})"></i>
                </td></tr>`;
        });
    }

    function renderGen() {
        const tb = document.getElementById('genServicesTable'); tb.innerHTML = '';
        genSrv.forEach(s => {
            tb.innerHTML += `<tr><td class="w-100">${s.posluga}</td><td class="fw-bold px-3">${s.cina} ₴</td>
                <td class="text-end"><button class="btn btn-sm btn-success me-2" onclick="addC('${s.posluga}',${s.cina})">+</button><button class="btn btn-sm btn-outline-danger" onclick="delG(${s.id})">x</button></td></tr>`;
        });
    }

    async function saveCar() { await fetch('/api/add_car',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({brand:document.getElementById('nb').value,model:document.getElementById('nm').value})}); location.reload(); }
    async function renB(o) { let n=prompt("Нова назва:",o); if(n&&n!==o){ await fetch('/api/rename_brand',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({old_name:o,new_name:n})}); location.reload(); }}
    async function renM(b,o) { let n=prompt("Нова назва:",o); if(n&&n!==o){ await fetch('/api/rename_model',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({brand:b,old_name:o,new_name:n})}); location.reload(); }}
    async function saveSrv() { await fetch('/api/add_service',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({brand:curB,model:curM,service_name:document.getElementById('sn').value,price:parseInt(document.getElementById('sp').value)})}); location.reload(); }
    async function edP(id,o) { let n=prompt("Ціна:",o); if(n){ await fetch('/api/edit_service',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,price:n})}); location.reload(); }}
    async function delS(id) { if(confirm("Видалити?")){ await fetch('/api/delete_service',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})}); location.reload(); }}
    async function delB(n) { if(confirm("Видалити марку?")){ await fetch('/api/delete_brand',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n})}); location.reload(); }}
    async function delM(b,m) { if(confirm("Видалити модель?")){ await fetch('/api/delete_model',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({brand:b,model:m})}); location.reload(); }}
    async function runImport() { await fetch('/api/bulk_import',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:document.getElementById('it').value})}); location.reload(); }
    async function saveGen() { await fetch('/api/add_general_service',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:document.getElementById('gn').value,price:parseInt(document.getElementById('gp').value)})}); location.reload(); }
    async function delG(id) { await fetch('/api/delete_general_service',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})}); location.reload(); }

    function addC(n,p) { cart.push({n,p}); renderCart(); }
    function renderCart() {
        const l = document.getElementById('cartList'); let t=0;
        l.innerHTML = cart.length?'':'<li class="p-4 text-center text-muted">Порожньо</li>';
        cart.forEach((i,idx)=>{ t+=parseInt(i.p); l.innerHTML+=`<li class="list-group-item d-flex justify-content-between"><span>${i.n}</span><b>${i.p} ₴ <i class="bi bi-x text-danger" onclick="cart.splice(${idx},1);renderCart()"></i></b></li>`; });
        document.getElementById('cartTotal').innerText = t+' ₴'; document.getElementById('printBtn').disabled = !cart.length;
    }
    function filterCars() { searchQ = document.getElementById('carSearch').value.toLowerCase(); renderBrands(); }
    function switchTab(t) {
        document.getElementById('view-cars').classList.toggle('d-none', t!=='cars');
        document.getElementById('view-gen').classList.toggle('d-none', t!=='gen');
        document.getElementById('tab-cars').classList.toggle('active', t==='cars');
        document.getElementById('tab-gen').classList.toggle('active', t==='gen');
        if(t==='gen') renderGen();
    }
    window.onload = () => { renderBrands(); renderGen(); }
</script>
</body>
</html>
